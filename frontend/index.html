    <title>GEO Agent - Generative Engine Optimization</title>
    <style id="theme-init-styles">
      /* Instant background application to prevent white/black flicker */
      html.dark-theme, html.dark-theme body { background-color: #08080A !important; color: #F8FAFC !important; }
      html.light-theme, html.light-theme body { background-color: #FAFBFE !important; color: #020617 !important; }
      html { background-color: #08080A; } /* Default fallback same as initial theme(dark) */
    </style>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('geo_theme') || 'dark';
          document.documentElement.classList.add(theme + '-theme');
        } catch (e) {
          console.error('Theme initialization failed', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
